<!DOCTYPE html>

<html lang="en-GB">

<head>
  <meta charset="utf-8">
  <title>Eyegor</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="static/eyegor_eye.png">
  <script src="script.js"></script>
</head>

<header>
  <input
    id="warning"
    type="image"
    src="static/triangle-warning.svg"
    alt="Warning!"
    width="20px"
  ></input>
  <div id="eyegor"> EYEGOR </div>
  <input
    id="info"
    type="image"
    src="static/info.svg"
    alt="Info"
    width="20px"
  ></input>
</header>

<body>
  <!-- <h1>Deck Explorer</h1> -->

  <div id="deck_loader">
    <label>Deck link:</label>
    <input id="deck_link"></input>
    <button onclick="loadDeck()">Load</button>
  </div>

  <hr>

  <div id="card_viewer">
    <h2 id="deck_name">Deck Name</h2>

    <br>

    <div id="active_number" class="small_div">Card Number</div>
    <br>
    <div id="active_house" class="small_div">Active House</div>

    <br>

    <div id="cards_div">
      <input
        id="prev"
        type="image"
        alt="Previous"
        onclick="changeCard(-1)"
        src=""
        class="card card_button"
      ></input>

      <div id="active_card_box">
        <img
          src=""
          alt="Waiting For Deck"
          id="card_img"
          class="card"
        >
      </div>

      <input
        id="next"
        type="image"
        alt="Next"
        onclick="changeCard(1)"
        src=""
        class="card card_button"
      ></input>
    </div>

    <br>

    <div id="active_data" class="small_div">Data about this card</div>
  </div>

</body>

</html>
