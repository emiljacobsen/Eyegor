<!DOCTYPE html>

<html lang="en-GB">

<head>
  <meta charset="utf-8">
  <title>Eyegor</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="eyegor_eye.png">
  <script src="script.js"></script>
</head>

<header>
  <button id="warning">Warning!</button>
  <div id="eyegor">EYEGOR</div>
  <button id="info">Info</button>
</header>

<body>
  <!-- <h1>Deck Explorer</h1> -->

  <div id="deck_loader">
    <label>Deck link:</label>
    <input id="deck_link"></input>
    <button onclick="loadDeck()">Load</button>
  </div>

  <hr>

  <div id="card_viewer">
    <h2 id="deck_name">Deck Name</h2>

    <br>

    <div id="cards_div">
      <input
        id="prev"
        type="image"
        alt="Previous"
        onclick="changeCard(-1)"
        src=""
        class="card card_button"
      ></input>

      <div id="active_card_box">
        <p id="active_number">Card Number</p>
        <p id="active_house">Active House</p>
        <br>
        <img
          src=""
          alt="Waiting For Deck"
          id="card_img"
          class="card"
        >
        <br>
        <p id="active_data">Data about this card</p>
      </div>

      <input
        id="next"
        type="image"
        alt="Next"
        onclick="changeCard(1)"
        src=""
        class="card card_button"
      ></input>
    </div>
  </div>

</body>

</html>
